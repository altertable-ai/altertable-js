name: Test

on:
  push:
    branches:
      - main
  pull_request: {}
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('.node-version') }}-bun-${{ hashFiles('.bun-version') }}-lock-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ hashFiles('.node-version') }}-bun-${{ hashFiles('.bun-version') }}-lock-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Check bundle sizes
        run: bun run bundlesize

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      altertable:
        image: ghcr.io/altertable-ai/altertable-mock:latest
        ports:
          - 15001:15001
        env:
          ALTERTABLE_MOCK_API_KEYS: valid_api_key
          ALTERTABLE_MOCK_ENVIRONMENTS: production,integration_env
        options: >-
          --health-cmd "exit 0"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 3
          --health-start-period 10s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build core JavaScript SDK package
        run: |
          cd packages/altertable-js
          bun run build
          test -f dist/index.js

      - name: Run integration smoke test (core JS SDK)
        run: bun run test:integration
