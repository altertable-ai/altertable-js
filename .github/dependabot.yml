version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "11:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 2
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
